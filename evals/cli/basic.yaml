suite: cli
name: CLI subprocess side-effect evals
cases:
  - id: cli-file-side-effect
    name: CLI 子进程修改隔离 fixture 文件
    tags: [cli, side-effect, regression]
    difficulty: medium
    mode: cli-subprocess
    prompt: "执行脚本，把 input.txt 标记为 complete"
    setup:
      fixture: evals/fixtures/cli-basic
    cli:
      command: node
      args: ["update-file.mjs"]
      timeoutMs: 10000
      expectedExitCode: 0
    expect:
      final:
        contains: ["updated input.txt"]
      budgets:
        maxSteps: 1
        maxDurationMs: 10000
        maxCostUsd: 0
      safety:
        forbidSecrets: true
        forbiddenOutputPatterns: ["LANGFUSE_SECRET_KEY", "OPENAI_API_KEY"]
        forbiddenToolInputPatterns: ["\\.env", "\\.ssh"]
      sideEffects:
        files:
          - path: input.txt
            exists: true
            contains: ["status: pending", "status: complete"]
